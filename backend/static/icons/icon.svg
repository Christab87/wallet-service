<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f2942;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" fill="url(#grad1)" rx="45"/>
  
  <!-- Wallet shape -->
  <g transform="translate(48, 56)">
    <!-- Card stack -->
    <rect x="0" y="0" width="96" height="68" fill="#22c55e" rx="8"/>
    <rect x="4" y="4" width="96" height="68" fill="#16a34a" rx="8" opacity="0.7"/>
    
    <!-- BTC symbol -->
    <text x="48" y="50" font-size="42" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">₿</text>
  </g>
</svg>
